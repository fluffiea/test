name: momoya-dev

services:
  mongo:
    image: mongo:7
    container_name: momoya-mongo-dev
    restart: unless-stopped
    command: ["--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1
    container_name: momoya-mongo-express-dev
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-dev-data:
    driver: local
