configuration:
  pageTitle: "test"
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: "zh-CN"
  baseUrl: "fluffiea.github.io/test"
  ignorePatterns:
    - ".obsidian"
    - ".DS_Store"

  theme:
    fontOrigin: "googleFonts"
    cdnCaching: true
    typography:
      header: "Schibsted Grotesk"
      body: "Source Sans Pro"
      code: "IBM Plex Mono"
    colors:
      lightMode:
        light: "#faf8f8"
        lightgray: "#e5e5e5"
        gray: "#b8b8b8"
        darkgray: "#4e4e4e"
        dark: "#2b2b2b"
        secondary: "#284b63"
        tertiary: "#84a59d"
        highlight: "rgba(143, 223, 130, 0.15)"
        textHighlight: "#fff23688"
      darkMode:
        light: "#161618"
        lightgray: "#393639"
        gray: "#646464"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#7b97aa"
        tertiary: "#84a59d"
        highlight: "rgba(143, 223, 130, 0.15)"
        textHighlight: "#b3aa0288"

plugins:
  - source: "github:quartz-community/created-modified-date"
    enabled: true
    options:
      defaultDateType: "modified"
    priority: ["frontmatter", "git", "filesystem"]
    order: 10
  - source: "github:quartz-community/syntax-highlighting"
    enabled: true
    order: 20
  - source: "github:quartz-community/obsidian-flavored-markdown"
    enabled: true
    order: 30
  - source: "github:quartz-community/github-flavored-markdown"
    enabled: true
    order: 40
  - source: "github:quartz-community/table-of-contents"
    enabled: true
    order: 50
    layout:
      position: "right"
      priority: 30
  - source: "github:quartz-community/crawl-links"
    enabled: true
    order: 60
  - source: "github:quartz-community/description"
    enabled: true
    order: 70
  - source: "github:quartz-community/latex"
    enabled: true
    order: 80
  - source: "github:quartz-community/remove-draft"
    enabled: true
  - source: "github:quartz-community/alias-redirects"
    enabled: true
  - source: "github:quartz-community/content-index"
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: "github:quartz-community/favicon"
    enabled: true
  - source: "github:quartz-community/og-image"
    enabled: true
  - source: "github:quartz-community/cname"
    enabled: true
  - source: "github:quartz-community/note-properties"
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - "description"
        - "tags"
        - "aliases"
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: "yaml"
    order: 5
    layout:
      position: "beforeBody"
      priority: 15

  - source: "github:quartz-community/canvas-page"
    enabled: true
  - source: "github:quartz-community/content-page"
    enabled: true
  - source: "github:quartz-community/folder-page"
    enabled: true
  - source: "github:quartz-community/tag-page"
    enabled: true

  - source: "github:quartz-community/explorer"
    enabled: true
    layout:
      position: "left"
      priority: 50
  - source: "github:quartz-community/graph"
    enabled: true
    layout:
      position: "right"
      priority: 10
  - source: "github:quartz-community/search"
    enabled: true
    layout:
      position: "left"
      priority: 20
  - source: "github:quartz-community/backlinks"
    enabled: true
    layout:
      position: "right"
      priority: 50
  - source: "github:quartz-community/article-title"
    enabled: true
    layout:
      position: "beforeBody"
      priority: 10
  - source: "github:quartz-community/content-meta"
    enabled: true
    layout:
      position: "beforeBody"
      priority: 20
  - source: "github:quartz-community/page-title"
    enabled: true
    layout:
      position: "left"
      priority: 10
  - source: "github:quartz-community/darkmode"
    enabled: true
    layout:
      position: "left"
      priority: 30
  - source: "github:quartz-community/reader-mode"
    enabled: true
    layout:
      position: "left"
      priority: 35
  - source: "github:quartz-community/breadcrumbs"
    enabled: true
    layout:
      position: "beforeBody"
      priority: 5
    options:
      condition: "not-index"
  - source: "github:quartz-community/footer"
    enabled: true
    options:
      links:
        - text: "GitHub"
          link: "https://github.com/fluffiea/test"
  - source: "github:quartz-community/spacer"
    enabled: true
    order: 25
    layout:
      position: "left"
      priority: 25
    options:
      display: "mobile-only"
  - source: "github:quartz-community/unlisted-pages"
    enabled: true
    order: 45
  - source: "github:quartz-community/encrypted-pages"
    enabled: true
    options:
      iterations: 600000
      passwordField: "password"
      unlistWhenEncrypted: false
      outputPath: "static/encryptedContentIndex.json"
    order: 900
    layout:
      position: "body"
      priority: 100
    options:
      display: "all"
