name: Deploy Nook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Notes
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Quartz 5 Engine
        run: |
          git clone --branch v5 --depth 1 https://github.com/jackyzha0/quartz.git .quartz-engine

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .quartz-engine/package-lock.json

      - name: Symlink Notes to Quartz
        run: |
          rm -rf .quartz-engine/content
          ln -s "$(pwd)" .quartz-engine/content
          cp quartz.config.yaml .quartz-engine/quartz.config.yaml

      - name: Install Dependencies
        env:
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_mintimeout: "20000"
          npm_config_fetch_retry_maxtimeout: "120000"
        run: |
          cd .quartz-engine
          git config --global http.version HTTP/1.1

          retry() {
            local max="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Failed after ${max} attempts: $*"
                return 1
              fi
              echo "Attempt ${n}/${max} failed, retrying in 15s..."
              sleep 15
              n=$((n + 1))
            done
          }

          retry 3 npm ci
          retry 3 node quartz/bootstrap-cli.mjs plugin install
          node quartz/bootstrap-cli.mjs plugin install --from-config

      - name: Build Quartz Site
        run: |
          cd .quartz-engine
          node quartz/bootstrap-cli.mjs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz-engine/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
