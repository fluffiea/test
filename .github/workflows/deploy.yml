name: Deploy Nook to GitHub Pages

on:
  push:
    branches:
      - main # 顺应第二份，使用你的主分支

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # 优雅替代：不拷贝官方源码，而是利用官方提供的 CLI 工具原地初始化和链接
      - name: Initialize Quartz 5 via Symlink
        run: npx quartz create --directory . --strategy symlink

      - name: Install Dependencies
        run: |
          npx quartz plugin install --from-config
          npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4