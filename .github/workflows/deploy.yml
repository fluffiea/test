name: Deploy Nook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Notes
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # 💡 核心修复：克隆官方仓库到单独的目录，并用稳定的版本
      - name: Fetch Quartz 5 Engine
        run: |
          git clone --branch v5 --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      # 💡 核心修复：不再手动一条条拷贝 cp，而是把你的纯笔记目录变成它的 content
      - name: Symlink Notes to Quartz
        run: |
          # content 必须是链接本身，不能是已存在目录，否则 ln 会创建 content/<仓库名>/ 子目录
          rm -rf /tmp/quartz/content
          ln -s "$(pwd)" /tmp/quartz/content
          cp quartz.config.yaml /tmp/quartz/quartz.config.yaml

      - name: Install Dependencies
        env:
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_mintimeout: "20000"
          npm_config_fetch_retry_maxtimeout: "120000"
        run: |
          cd /tmp/quartz
          git config --global http.version HTTP/1.1

          retry() {
            local max="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Failed after ${max} attempts: $*"
                return 1
              fi
              echo "Attempt ${n}/${max} failed, retrying in 15s..."
              sleep 15
              n=$((n + 1))
            done
          }

          retry 3 npm ci
          retry 3 node quartz/bootstrap-cli.mjs plugin install

      - name: Build Quartz Site
        run: |
          cd /tmp/quartz
          node quartz/bootstrap-cli.mjs build

      # 💡 将在 /tmp/quartz/public 生成的静态网页抽取出来准备上传
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4