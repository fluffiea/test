name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  QUARTZ_VERSION: v5.0.0
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout vault
        uses: actions/checkout@v6

      - name: Clone Quartz engine
        run: |
          git clone --branch "${{ env.QUARTZ_VERSION }}" --depth 1 \
            https://github.com/jackyzha0/quartz.git /tmp/quartz-engine

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: /tmp/quartz-engine/package-lock.json

      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: /tmp/quartz-engine/.quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ env.QUARTZ_VERSION }}-${{ hashFiles('/tmp/quartz-engine/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-${{ env.QUARTZ_VERSION }}-
            ${{ runner.os }}-quartz-plugins-

      - name: Copy Quartz config to engine directory
        run: cp quartz.config.yaml /tmp/quartz-engine/quartz.config.yaml

      - name: Install dependencies
        working-directory: /tmp/quartz-engine
        run: |
          npm ci
          node quartz/bootstrap-cli.mjs plugin install
          node quartz/bootstrap-cli.mjs plugin resolve

      - name: Build site
        working-directory: /tmp/quartz-engine
        run: |
          node quartz/bootstrap-cli.mjs build \
            -d "${{ github.workspace }}" \
            -o public

      - name: Verify build output
        run: |
          test -f /tmp/quartz-engine/public/index.html
          grep -q 'data-basepath="/test"' /tmp/quartz-engine/public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz-engine/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
